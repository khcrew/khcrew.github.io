name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Daily Blog Pipeline"]
    types: [completed]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Checkout shared source (khfamily)
        uses: actions/checkout@v7
        with:
          repository: khfamily/khfamily.github.io
          token: ${{ secrets.GH_PAT }}
          path: _shared
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build site
        run: uv run python scripts/build.py --env production

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
